services:
  chrome:
    image: chromedp/headless-shell:latest
    expose:
      - "9222"
    shm_size: '2gb'
    networks:
      - travel-planner-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: travel
      POSTGRES_PASSWORD: travel
      POSTGRES_DB: travel_planner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel -d travel_planner"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - travel-planner-network

  api:
    build:
      context: ../../src/packages/api
      dockerfile: Dockerfile
    expose:
      - "8080"
    env_file:
      - path: ../../src/packages/api/.env
        required: false
    environment:
      - GO_ENV=production
      - CHROME_WS_URL=ws://chrome:9222/
      - DATABASE_URL=postgres://travel:travel@postgres:5432/travel_planner?sslmode=disable
    depends_on:
      chrome:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - travel-planner-network

  gateway:
    build:
      context: ../..
      dockerfile: dockerize/deployment/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - travel-planner-network

volumes:
  postgres_data:

networks:
  travel-planner-network:
    driver: bridge
