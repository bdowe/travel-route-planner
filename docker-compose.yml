version: '3.8'

services:
  travel-route-planner-api:
    build:
      context: ./src/packages/api
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - GO_ENV=development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - travel-planner-network

  travel-route-planner-web:
    build:
      context: ./src/packages/flutter-app
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    environment:
      - API_BASE_URL=http://localhost:8081/api/v1
    restart: unless-stopped
    depends_on:
      - travel-route-planner-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - travel-planner-network

  # Uncomment below when you need a database
